AWSTemplateFormatVersion: "2010-09-09"
Description: >
  SQL Injection Prevention tutorial — deploys the interceptor Lambda (REQUEST interceptor)
  and a mock customer query tool Lambda for AgentCore Gateway.

Resources:
  InterceptorRole:
    Type: AWS::IAM::Role
    Metadata:
      cfn_nag:
        rules_to_suppress:
          - id: W11
            reason: >-
              Sample IAM roles use broad permissions for tutorial clarity; scope down for production
          - id: W12
            reason: >-
              Sample IAM resource wildcards acceptable for tutorial; use least-privilege in production
          - id: W28
            reason: >-
              Resource deletion policy not set for sample/tutorial resources
          - id: W76
            reason: >-
              sAmple code - CIS rule not required for tutorial IAM roles
          - id: F3
            reason: >-
              Sample IAM policy allows broad actions for tutorial demonstration; restrict in production
    Properties:
      RoleName: agentcore-sql-interceptor-role
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole

  ToolRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: agentcore-sql-tool-role
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole

  InterceptorFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: agentcore-sql-injection-interceptor
      Runtime: python3.12
      Handler: index.lambda_handler
      Role: !GetAtt InterceptorRole.Arn
      Timeout: 30
      MemorySize: 256
      Description: AgentCore REQUEST interceptor — SQL injection pattern detection
      Code:
        ZipFile: |
          import json
          import re
          import hashlib
          from typing import Any, Dict, Tuple, List

          STRICT_MODE = False
          MAX_STRING_LENGTH = 10000

          SQL_INJECTION_PATTERNS = [
              (r';[\s\n]*\b(SELECT|INSERT|UPDATE|DELETE|DROP|CREATE|ALTER|TRUNCATE|EXEC|EXECUTE)\b', 'STACKED_QUERY'),
              (r'\b(DROP|TRUNCATE)\b[\s\n]+\b(TABLE|DATABASE|SCHEMA)\b', 'DANGEROUS_DDL'),
              (r'--', 'SQL_COMMENT_DASH'),
              (r'/\*', 'SQL_COMMENT_OPEN'),
              (r'\*/', 'SQL_COMMENT_CLOSE'),
              (r'\bUNION\b[\s\n]+\bSELECT\b', 'UNION_SELECT'),
              (r'\bUNION\b[\s\n]+\bALL\b[\s\n]+\bSELECT\b', 'UNION_ALL_SELECT'),
              (r'\bOR\b[\s\n]+1[\s\n]*=[\s\n]*1', 'TAUTOLOGY_OR'),
              (r'\bAND\b[\s\n]+1[\s\n]*=[\s\n]*1', 'TAUTOLOGY_AND'),
              (r'\bSLEEP\b[\s\n]*\(', 'TIME_SLEEP'),
              (r'\bWAITFOR\b[\s\n]+\bDELAY\b', 'TIME_WAITFOR'),
              (r'\bBENCHMARK\b[\s\n]*\(', 'TIME_BENCHMARK'),
              (r'\b(EXEC|EXECUTE|sp_executesql)\b', 'DYNAMIC_SQL'),
              (r'\b(ALTER|RENAME|GRANT|REVOKE)\b[\s\n]+\b(TABLE|DATABASE|USER)\b', 'DANGEROUS_DDL_EXTENDED'),
              (r'\bCONCAT\b[\s\n]*\(', 'STRING_CONCAT'),
              (r'\bCHR\b[\s\n]*\(|\bCHAR\b[\s\n]*\(', 'CHAR_ENCODING'),
              (r'\bSUBSTRING\b[\s\n]*\(|\bSUBSTR\b[\s\n]*\(', 'SUBSTRING_PROBE'),
              (r'\bCONVERT\b[\s\n]*\(|\bCAST\b[\s\n]*\(', 'TYPE_CONVERSION'),
              (r'0x[0-9a-fA-F]+', 'HEX_ENCODING'),
              (r'\bINFORMATION_SCHEMA\b', 'SCHEMA_ENUMERATION'),
              (r'\bLOAD_FILE\b|\bINTO\b[\s\n]+\bOUTFILE\b', 'FILE_OPERATIONS'),
          ]

          COMPILED_PATTERNS = [(re.compile(p, re.IGNORECASE | re.MULTILINE), rid) for p, rid in SQL_INJECTION_PATTERNS]

          def normalize_string(s):
              return re.sub(r'\s+', ' ', s).lower()

          def compute_query_hash(query):
              return hashlib.sha256(query.encode()).hexdigest()[:16]

          def extract_all_strings(obj, path=""):
              strings = []
              if isinstance(obj, dict):
                  for key, value in obj.items():
                      strings.extend(extract_all_strings(value, f"{path}.{key}" if path else key))
              elif isinstance(obj, list):
                  for idx, item in enumerate(obj):
                      strings.extend(extract_all_strings(item, f"{path}[{idx}]"))
              elif isinstance(obj, str):
                  strings.append((path, obj))
              return strings

          def detect_sql_injection(value, field_path=""):
              if not value:
                  return False, "", ""
              if len(value) > MAX_STRING_LENGTH:
                  return True, "STRING_TOO_LONG", "INVALID_INPUT"
              normalized = normalize_string(value)
              for pattern, rule_id in COMPILED_PATTERNS:
                  if pattern.search(normalized):
                      return True, rule_id, "SQL_INJECTION_DETECTED"
              return False, "", ""

          def analyze_arguments(arguments):
              all_strings = extract_all_strings(arguments)
              if not all_strings:
                  return True, "", ""
              for field_path, value in all_strings:
                  is_malicious, rule_id, category = detect_sql_injection(value, field_path)
                  if is_malicious:
                      print(f"[SECURITY] SQL injection detected | field={field_path} | rule={rule_id} | hash={compute_query_hash(value)}")
                      return False, rule_id, category
              return True, "", ""

          def create_blocked_response(category, request_id):
              return {
                  "interceptorOutputVersion": "1.0",
                  "mcp": {
                      "transformedGatewayResponse": {
                          "statusCode": 403,
                          "headers": {"Content-Type": "application/json", "X-Security-Status": "BLOCKED"},
                          "body": {
                              "jsonrpc": "2.0",
                              "id": request_id,
                              "error": {
                                  "code": -32000,
                                  "message": "Request blocked by security policy",
                                  "data": {"category": category, "security_policy": "sql_injection_prevention"}
                              }
                          }
                      }
                  }
              }

          def lambda_handler(event, context):
              try:
                  mcp_data = event.get('mcp', {})
                  gateway_request = mcp_data.get('gatewayRequest', {})
                  request_body = gateway_request.get('body', {})
                  method = request_body.get('method', '')
                  request_id = request_body.get('id', 'unknown')

                  print(f"[INFO] Interceptor invoked | request_id={request_id} | method={method}")

                  if method != 'tools/call':
                      return {
                          "interceptorOutputVersion": "1.0",
                          "mcp": {"transformedGatewayRequest": {"headers": gateway_request.get('headers', {}), "body": request_body}}
                      }

                  params = request_body.get('params', {})
                  tool_name = params.get('name', '')
                  arguments = params.get('arguments', {})

                  print(f"[INFO] Analyzing tool call | request_id={request_id} | tool={tool_name}")

                  if STRICT_MODE and ('query' in arguments or 'sql' in arguments):
                      print(f"[SECURITY] STRICT MODE: Raw SQL field rejected | request_id={request_id}")
                      return create_blocked_response("RAW_SQL_NOT_ALLOWED", request_id)

                  is_safe, rule_id, category = analyze_arguments(arguments)

                  if is_safe:
                      print(f"[INFO] Request allowed | request_id={request_id} | tool={tool_name}")
                      return {
                          "interceptorOutputVersion": "1.0",
                          "mcp": {"transformedGatewayRequest": {"headers": gateway_request.get('headers', {}), "body": request_body}}
                      }
                  else:
                      print(f"[SECURITY] Request blocked | request_id={request_id} | tool={tool_name} | rule={rule_id}")
                      return create_blocked_response(category, request_id)

              except Exception as e:
                  print(f"[ERROR] Interceptor error | error={str(e)[:100]}")
                  return create_blocked_response("INTERCEPTOR_ERROR", request_body.get('id', 'unknown'))

  InterceptorPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref InterceptorFunction
      Action: lambda:InvokeFunction
      Principal: bedrock-agentcore.amazonaws.com

  ToolFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: agentcore-sql-customer-query-tool
      Runtime: python3.12
      Handler: index.lambda_handler
      Role: !GetAtt ToolRole.Arn
      Timeout: 30
      MemorySize: 256
      Description: Mock customer query tool — protected by Gateway interceptor
      Code:
        ZipFile: |
          import json
          import random

          def lambda_handler(event, context):
              body = event if isinstance(event, dict) else json.loads(event)
              query = body.get('query')

              if not query:
                  return {"statusCode": 400, "body": json.dumps({"error": "query parameter is required", "success": False})}

              print(f"Processing query: {query}")

              first_names = ['Alice', 'Bob', 'Carol', 'David', 'Emma', 'Frank']
              last_names = ['Smith', 'Johnson', 'Williams', 'Brown', 'Jones']
              cities = ['Boston', 'Seattle', 'Austin', 'Denver', 'Portland']

              customers = []
              for _ in range(random.randint(1, 3)):
                  customers.append({
                      "customer_id": random.randint(10000, 99999),
                      "name": f"{random.choice(first_names)} {random.choice(last_names)}",
                      "email": f"{random.choice(first_names).lower()}@example.com",
                      "city": random.choice(cities),
                      "account_status": random.choice(['Active', 'Inactive']),
                      "total_orders": random.randint(0, 50),
                  })

              return {
                  "statusCode": 200,
                  "body": {
                      "tool": "customer_query_tool",
                      "query": query,
                      "results": customers,
                      "result_count": len(customers),
                      "success": True,
                  }
              }

  ToolPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref ToolFunction
      Action: lambda:InvokeFunction
      Principal: bedrock-agentcore.amazonaws.com

Outputs:
  InterceptorFunctionArn:
    Description: ARN of the SQL injection interceptor Lambda
    Value: !GetAtt InterceptorFunction.Arn
  ToolFunctionArn:
    Description: ARN of the mock customer query tool Lambda
    Value: !GetAtt ToolFunction.Arn
  InterceptorFunctionName:
    Description: Name of the interceptor Lambda
    Value: !Ref InterceptorFunction
  ToolFunctionName:
    Description: Name of the tool Lambda
    Value: !Ref ToolFunction
