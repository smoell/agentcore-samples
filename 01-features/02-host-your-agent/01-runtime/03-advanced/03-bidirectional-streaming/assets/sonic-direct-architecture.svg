<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#555" />
    </marker>
    <marker id="arrow-up" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2d6a4f" />
    </marker>
    <marker id="arrow-down" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1565c0" />
    </marker>
    <marker id="arrow-bidi" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#e91e63" />
    </marker>
    <marker id="arrow-tool" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#7e57c2" />
    </marker>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="1" dy="2" stdDeviation="3" flood-opacity="0.12" />
    </filter>
  </defs>

  <!-- Title -->
  <text x="450" y="32" text-anchor="middle" font-size="18" font-weight="700" fill="#000">Nova Sonic Direct Agent — Low-Level S2S</text>
  <text x="450" y="52" text-anchor="middle" font-size="12" fill="#666">Raw Bedrock Runtime bidirectional stream via AgentCore Proxy</text>

  <!-- ===== CLIENT BOX ===== -->
  <rect x="30" y="75" width="160" height="330" rx="12" fill="none" stroke="#888" stroke-width="1.5" filter="url(#shadow)" />
  <text x="110" y="100" text-anchor="middle" font-size="14" font-weight="700" fill="#000">Client (Browser)</text>

  <rect x="45" y="115" width="130" height="40" rx="8" fill="white" stroke="#aaa" />
  <text x="110" y="132" text-anchor="middle" font-size="11" font-weight="600" fill="#000">🎤 Microphone</text>
  <text x="110" y="148" text-anchor="middle" font-size="9" fill="#666">PCM 16kHz capture</text>

  <rect x="45" y="165" width="130" height="40" rx="8" fill="white" stroke="#aaa" />
  <text x="110" y="182" text-anchor="middle" font-size="11" font-weight="600" fill="#000">🔊 Audio Playback</text>
  <text x="110" y="198" text-anchor="middle" font-size="9" fill="#666">Web Audio API 24kHz</text>

  <rect x="45" y="215" width="130" height="55" rx="8" fill="white" stroke="#aaa" />
  <text x="110" y="232" text-anchor="middle" font-size="11" font-weight="600" fill="#000">📡 Event Protocol</text>
  <text x="110" y="248" text-anchor="middle" font-size="9" fill="#666">sessionStart, audioInput</text>
  <text x="110" y="260" text-anchor="middle" font-size="9" fill="#666">promptStart, contentStart</text>

  <rect x="45" y="280" width="130" height="40" rx="8" fill="white" stroke="#aaa" />
  <text x="110" y="297" text-anchor="middle" font-size="11" font-weight="600" fill="#000">⚙️ Config</text>
  <text x="110" y="313" text-anchor="middle" font-size="9" fill="#666">voice, region, prompt</text>

  <rect x="45" y="330" width="130" height="40" rx="8" fill="white" stroke="#aaa" />
  <text x="110" y="347" text-anchor="middle" font-size="11" font-weight="600" fill="#000">💬 Chat Display</text>
  <text x="110" y="363" text-anchor="middle" font-size="9" fill="#666">transcript + events</text>

  <!-- ===== AGENTCORE PROXY BOX ===== -->
  <rect x="230" y="75" width="120" height="330" rx="12" fill="none" stroke="#888" stroke-width="1.5" filter="url(#shadow)" />
  <text x="290" y="100" text-anchor="middle" font-size="14" font-weight="700" fill="#000">AgentCore</text>
  <text x="290" y="116" text-anchor="middle" font-size="11" fill="#555">WS Proxy</text>

  <rect x="243" y="135" width="94" height="55" rx="8" fill="white" stroke="#aaa" />
  <text x="290" y="155" text-anchor="middle" font-size="10" font-weight="600" fill="#000">Message</text>
  <text x="290" y="169" text-anchor="middle" font-size="10" font-weight="600" fill="#000">Relay</text>
  <text x="290" y="183" text-anchor="middle" font-size="9" fill="#666">raw events</text>

  <rect x="243" y="205" width="94" height="45" rx="8" fill="white" stroke="#aaa" />
  <text x="290" y="225" text-anchor="middle" font-size="10" font-weight="600" fill="#000">SigV4 Auth</text>
  <text x="290" y="241" text-anchor="middle" font-size="9" fill="#666">Pre-signed URLs</text>

  <rect x="243" y="265" width="94" height="45" rx="8" fill="white" stroke="#aaa" />
  <text x="290" y="285" text-anchor="middle" font-size="10" font-weight="600" fill="#000">IAM / IMDS</text>
  <text x="290" y="301" text-anchor="middle" font-size="9" fill="#666">Credential mgmt</text>

  <!-- ===== SERVER BOX ===== -->
  <rect x="390" y="75" width="490" height="330" rx="12" fill="none" stroke="#888" stroke-width="1.5" filter="url(#shadow)" />
  <text x="635" y="100" text-anchor="middle" font-size="14" font-weight="700" fill="#000">Server (FastAPI + S2sSessionManager)</text>

  <!-- Event Router -->
  <rect x="410" y="115" width="150" height="60" rx="8" fill="white" stroke="#999" filter="url(#shadow)" />
  <text x="485" y="135" text-anchor="middle" font-size="10" font-weight="600" fill="#000">📨 Event Router</text>
  <text x="485" y="149" text-anchor="middle" font-size="9" fill="#666">sessionStart → init stream</text>
  <text x="485" y="163" text-anchor="middle" font-size="9" fill="#666">audioInput → queue</text>

  <!-- Event Splitting -->
  <rect x="410" y="190" width="150" height="50" rx="8" fill="white" stroke="#999" filter="url(#shadow)" />
  <text x="485" y="210" text-anchor="middle" font-size="10" font-weight="600" fill="#000">✂️ Event Splitting</text>
  <text x="485" y="226" text-anchor="middle" font-size="9" fill="#666">Large audio → chunks</text>

  <!-- Audio Queue -->
  <rect x="410" y="255" width="150" height="50" rx="8" fill="white" stroke="#999" filter="url(#shadow)" />
  <text x="485" y="275" text-anchor="middle" font-size="10" font-weight="600" fill="#000">🎵 Audio Queue</text>
  <text x="485" y="291" text-anchor="middle" font-size="9" fill="#666">asyncio.Queue (max 100)</text>

  <!-- S2sSessionManager -->
  <rect x="590" y="115" width="270" height="100" rx="8" fill="white" stroke="#999" stroke-width="1.5" filter="url(#shadow)" />
  <text x="725" y="137" text-anchor="middle" font-size="12" font-weight="700" fill="#000">S2sSessionManager</text>
  <text x="725" y="155" text-anchor="middle" font-size="9" fill="#666">BedrockRuntimeClient (raw SDK)</text>
  <text x="725" y="169" text-anchor="middle" font-size="9" fill="#666">Bidirectional stream to Bedrock</text>
  <text x="725" y="183" text-anchor="middle" font-size="9" fill="#666">EnvironmentCredentialsResolver</text>
  <text x="725" y="197" text-anchor="middle" font-size="9" fill="#666">send_raw_event / _process_responses</text>

  <!-- Nova Sonic Model -->
  <rect x="590" y="230" width="270" height="80" rx="8" fill="none" stroke="#999" stroke-width="1.5" filter="url(#shadow)" />
  <text x="725" y="252" text-anchor="middle" font-size="12" font-weight="700" fill="#000">Nova Sonic (S2S)</text>
  <text x="725" y="268" text-anchor="middle" font-size="9" fill="#333">amazon.nova-2-sonic-v1:0</text>
  <text x="725" y="284" text-anchor="middle" font-size="9" fill="#666">16kHz in • 24kHz out • Built-in VAD</text>
  <text x="725" y="298" text-anchor="middle" font-size="9" fill="#666">Barge-in • Neural voice</text>

  <!-- Dashed raw stream label -->
  <rect x="585" y="108" width="282" height="210" rx="10" fill="none" stroke="#555" stroke-width="2" stroke-dasharray="6,3" />
  <text x="873" y="218" text-anchor="middle" font-size="10" font-weight="600" fill="#555" transform="rotate(90, 873, 218)">Raw Bidi Stream</text>

  <!-- Tool Processing -->
  <rect x="590" y="325" width="270" height="60" rx="8" fill="white" stroke="#999" filter="url(#shadow)" />
  <text x="725" y="345" text-anchor="middle" font-size="10" font-weight="600" fill="#000">🔧 Tool Processing</text>
  <text x="725" y="361" text-anchor="middle" font-size="9" fill="#666">getDateTool (built-in)</text>
  <text x="725" y="375" text-anchor="middle" font-size="9" fill="#666">Background asyncio.Task</text>

  <!-- Forward Responses -->
  <rect x="410" y="320" width="150" height="60" rx="8" fill="white" stroke="#999" filter="url(#shadow)" />
  <text x="485" y="340" text-anchor="middle" font-size="10" font-weight="600" fill="#000">📤 Forward</text>
  <text x="485" y="356" text-anchor="middle" font-size="9" fill="#666">output_queue → WS</text>
  <text x="485" y="370" text-anchor="middle" font-size="9" fill="#666">split + send to client</text>

  <!-- ===== ARROWS ===== -->
  <!-- Client ↔ Proxy -->
  <line x1="190" y1="180" x2="228" y2="180" stroke="#2d6a4f" stroke-width="2" marker-end="url(#arrow-up)" />
  <text x="209" y="173" text-anchor="middle" font-size="8" fill="#2d6a4f">events</text>
  <line x1="228" y1="200" x2="190" y2="200" stroke="#1565c0" stroke-width="2" marker-end="url(#arrow-down)" />
  <text x="209" y="215" text-anchor="middle" font-size="8" fill="#1565c0">audio + events</text>

  <!-- Proxy ↔ Server -->
  <line x1="350" y1="155" x2="388" y2="155" stroke="#2d6a4f" stroke-width="2" marker-end="url(#arrow-up)" />
  <line x1="388" y1="175" x2="350" y2="175" stroke="#1565c0" stroke-width="2" marker-end="url(#arrow-down)" />

  <!-- Event Router → S2sSessionManager -->
  <line x1="560" y1="140" x2="588" y2="140" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)" />
  <text x="574" y="133" text-anchor="middle" font-size="8" fill="#555">raw events</text>

  <!-- Audio Queue → S2sSessionManager -->
  <line x1="560" y1="275" x2="588" y2="200" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)" />
  <text x="580" y="245" text-anchor="middle" font-size="8" fill="#555">audio</text>

  <!-- S2sSessionManager ↔ Nova Sonic -->
  <line x1="725" y1="215" x2="725" y2="228" stroke="#e91e63" stroke-width="2" marker-end="url(#arrow-bidi)" />
  <text x="755" y="225" text-anchor="middle" font-size="8" fill="#e91e63">bidi stream</text>

  <!-- Tool Processing ↔ S2sSessionManager -->
  <line x1="725" y1="310" x2="725" y2="323" stroke="#7e57c2" stroke-width="1.5" stroke-dasharray="4,2" marker-end="url(#arrow-tool)" />
  <text x="760" y="320" text-anchor="middle" font-size="8" fill="#7e57c2">tool use</text>

  <!-- Legend -->
  <rect x="30" y="435" width="850" height="35" rx="8" fill="white" stroke="#ccc" />
  <line x1="50" y1="453" x2="80" y2="453" stroke="#2d6a4f" stroke-width="2" marker-end="url(#arrow-up)" />
  <text x="85" y="457" font-size="9" fill="#333">Client → Server</text>
  <line x1="195" y1="453" x2="225" y2="453" stroke="#1565c0" stroke-width="2" marker-end="url(#arrow-down)" />
  <text x="230" y="457" font-size="9" fill="#333">Server → Client</text>
  <line x1="340" y1="453" x2="370" y2="453" stroke="#e91e63" stroke-width="2" marker-end="url(#arrow-bidi)" />
  <text x="375" y="457" font-size="9" fill="#333">Bidi stream (Bedrock)</text>
  <line x1="500" y1="453" x2="530" y2="453" stroke="#555" stroke-width="1.5" />
  <text x="535" y="457" font-size="9" fill="#333">Internal pipeline</text>
  <line x1="640" y1="453" x2="670" y2="453" stroke="#7e57c2" stroke-width="1.5" stroke-dasharray="4,2" />
  <text x="675" y="457" font-size="9" fill="#333">Tool processing</text>
</svg>