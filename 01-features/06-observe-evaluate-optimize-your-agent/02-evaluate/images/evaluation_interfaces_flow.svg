<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 620" width="800" height="620">
  <!-- Background -->
  <rect width="800" height="620" fill="white"/>

  <!-- Definitions -->
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="2" flood-color="#00000015"/>
    </filter>
    <linearGradient id="boxGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2d2d2d"/>
      <stop offset="100%" style="stop-color:#1a1a1a"/>
    </linearGradient>
    <linearGradient id="smeGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#5a4a3a"/>
      <stop offset="100%" style="stop-color:#4a3728"/>
    </linearGradient>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#1a1a1a"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="400" y="32" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#4a3728" text-anchor="middle">Evaluation Interfaces — Data Flow</text>

  <!-- ===== Row 1: EvaluationClient ===== -->

  <g filter="url(#shadow)">
    <rect x="30" y="65" width="740" height="100" rx="6" ry="6" fill="url(#boxGradient)" stroke="#1a1a1a" stroke-width="1.5"/>
  </g>
  <text x="400" y="88" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="white" text-anchor="middle">EvaluationClient</text>
  <text x="400" y="104" font-family="Arial, sans-serif" font-size="10" fill="#aaaaaa" text-anchor="middle">Ad-hoc debugging, CI spot-checks on known sessions</text>

  <!-- Flow boxes inside -->
  <rect x="60" y="120" width="130" height="30" rx="3" ry="3" fill="#0d0d0d"/>
  <text x="125" y="139" font-family="Courier, monospace" font-size="9" fill="#7cb87c" text-anchor="middle">Existing Session ID</text>

  <line x1="195" y1="135" x2="235" y2="135" stroke="#aaaaaa" stroke-width="1.2" marker-end="url(#arrow)"/>

  <rect x="240" y="120" width="130" height="30" rx="3" ry="3" fill="#0d0d0d"/>
  <text x="305" y="139" font-family="Courier, monospace" font-size="9" fill="#7cb87c" text-anchor="middle">CloudWatch Lookup</text>

  <line x1="375" y1="135" x2="415" y2="135" stroke="#aaaaaa" stroke-width="1.2" marker-end="url(#arrow)"/>

  <rect x="420" y="120" width="130" height="30" rx="3" ry="3" fill="#0d0d0d"/>
  <text x="485" y="139" font-family="Courier, monospace" font-size="9" fill="#7cb87c" text-anchor="middle">Evaluate (client)</text>

  <line x1="555" y1="135" x2="595" y2="135" stroke="#aaaaaa" stroke-width="1.2" marker-end="url(#arrow)"/>

  <rect x="600" y="120" width="140" height="30" rx="3" ry="3" fill="#0d0d0d"/>
  <text x="670" y="139" font-family="Courier, monospace" font-size="9" fill="#cc9999" text-anchor="middle">Per-Session Scores</text>

  <!-- ===== Row 2: OnDemandEvaluationDatasetRunner ===== -->

  <g filter="url(#shadow)">
    <rect x="30" y="195" width="740" height="115" rx="6" ry="6" fill="url(#boxGradient)" stroke="#1a1a1a" stroke-width="1.5"/>
  </g>
  <text x="400" y="218" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="white" text-anchor="middle">OnDemandEvaluationDatasetRunner</text>
  <text x="400" y="234" font-family="Arial, sans-serif" font-size="10" fill="#aaaaaa" text-anchor="middle">Regression testing, CI/CD pipelines with a dataset</text>

  <!-- Flow boxes inside -->
  <rect x="50" y="250" width="90" height="30" rx="3" ry="3" fill="#0d0d0d"/>
  <text x="95" y="269" font-family="Courier, monospace" font-size="9" fill="#7cb87c" text-anchor="middle">Dataset</text>

  <line x1="145" y1="265" x2="175" y2="265" stroke="#aaaaaa" stroke-width="1.2" marker-end="url(#arrow)"/>

  <rect x="180" y="250" width="110" height="30" rx="3" ry="3" fill="#0d0d0d"/>
  <text x="235" y="269" font-family="Courier, monospace" font-size="9" fill="#7cb87c" text-anchor="middle">Invoke Agent</text>

  <line x1="295" y1="265" x2="325" y2="265" stroke="#aaaaaa" stroke-width="1.2" marker-end="url(#arrow)"/>

  <rect x="330" y="250" width="120" height="30" rx="3" ry="3" fill="#0d0d0d"/>
  <text x="390" y="265" font-family="Courier, monospace" font-size="9" fill="#7cb87c" text-anchor="middle">Wait for CW</text>
  <text x="390" y="277" font-family="Courier, monospace" font-size="8" fill="#666666" text-anchor="middle">(180s ingestion)</text>

  <line x1="455" y1="265" x2="485" y2="265" stroke="#aaaaaa" stroke-width="1.2" marker-end="url(#arrow)"/>

  <rect x="490" y="250" width="110" height="30" rx="3" ry="3" fill="#0d0d0d"/>
  <text x="545" y="269" font-family="Courier, monospace" font-size="9" fill="#7cb87c" text-anchor="middle">Evaluate (client)</text>

  <line x1="605" y1="265" x2="635" y2="265" stroke="#aaaaaa" stroke-width="1.2" marker-end="url(#arrow)"/>

  <rect x="640" y="250" width="110" height="30" rx="3" ry="3" fill="#0d0d0d"/>
  <text x="695" y="269" font-family="Courier, monospace" font-size="9" fill="#cc9999" text-anchor="middle">Per-Scenario Scores</text>

  <!-- ===== Row 3: BatchEvaluationRunner ===== -->

  <g filter="url(#shadow)">
    <rect x="30" y="340" width="740" height="115" rx="6" ry="6" fill="url(#boxGradient)" stroke="#1a1a1a" stroke-width="1.5"/>
  </g>
  <text x="400" y="363" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="white" text-anchor="middle">BatchEvaluationRunner</text>
  <text x="400" y="379" font-family="Arial, sans-serif" font-size="10" fill="#aaaaaa" text-anchor="middle">Baseline snapshots, large-scale evaluation, pre/post comparison</text>

  <!-- Flow boxes inside -->
  <rect x="50" y="395" width="90" height="30" rx="3" ry="3" fill="#0d0d0d"/>
  <text x="95" y="414" font-family="Courier, monospace" font-size="9" fill="#7cb87c" text-anchor="middle">Dataset</text>

  <line x1="145" y1="410" x2="175" y2="410" stroke="#aaaaaa" stroke-width="1.2" marker-end="url(#arrow)"/>

  <rect x="180" y="395" width="110" height="30" rx="3" ry="3" fill="#0d0d0d"/>
  <text x="235" y="414" font-family="Courier, monospace" font-size="9" fill="#7cb87c" text-anchor="middle">Invoke Agent</text>

  <line x1="295" y1="410" x2="325" y2="410" stroke="#aaaaaa" stroke-width="1.2" marker-end="url(#arrow)"/>

  <rect x="330" y="395" width="140" height="30" rx="3" ry="3" fill="#0d0d0d"/>
  <text x="400" y="414" font-family="Courier, monospace" font-size="9" fill="#7cb87c" text-anchor="middle">Submit Batch (server)</text>

  <line x1="475" y1="410" x2="505" y2="410" stroke="#aaaaaa" stroke-width="1.2" marker-end="url(#arrow)"/>

  <rect x="510" y="395" width="100" height="30" rx="3" ry="3" fill="#0d0d0d"/>
  <text x="560" y="414" font-family="Courier, monospace" font-size="9" fill="#7cb87c" text-anchor="middle">Poll Status</text>

  <line x1="615" y1="410" x2="645" y2="410" stroke="#aaaaaa" stroke-width="1.2" marker-end="url(#arrow)"/>

  <rect x="650" y="395" width="100" height="30" rx="3" ry="3" fill="#0d0d0d"/>
  <text x="700" y="414" font-family="Courier, monospace" font-size="9" fill="#cc9999" text-anchor="middle">Aggregate Scores</text>

  <!-- ===== Row 4: DatasetClient ===== -->

  <g filter="url(#shadow)">
    <rect x="30" y="485" width="740" height="100" rx="6" ry="6" fill="url(#smeGradient)" stroke="#3a2718" stroke-width="1.5"/>
  </g>
  <text x="400" y="508" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="white" text-anchor="middle">DatasetClient</text>
  <text x="400" y="524" font-family="Arial, sans-serif" font-size="10" fill="#d0c0b0" text-anchor="middle">Managed storage + versioning for reproducible CI/CD</text>

  <!-- Flow boxes inside -->
  <rect x="60" y="540" width="110" height="30" rx="3" ry="3" fill="#2a1a0a"/>
  <text x="115" y="559" font-family="Courier, monospace" font-size="9" fill="#cc9999" text-anchor="middle">Create (DRAFT)</text>

  <line x1="175" y1="555" x2="215" y2="555" stroke="#d0c0b0" stroke-width="1.2" marker-end="url(#arrow)"/>

  <rect x="220" y="540" width="130" height="30" rx="3" ry="3" fill="#2a1a0a"/>
  <text x="285" y="559" font-family="Courier, monospace" font-size="9" fill="#cc9999" text-anchor="middle">Publish Version</text>

  <line x1="355" y1="555" x2="395" y2="555" stroke="#d0c0b0" stroke-width="1.2" marker-end="url(#arrow)"/>

  <rect x="400" y="540" width="150" height="30" rx="3" ry="3" fill="#2a1a0a"/>
  <text x="475" y="559" font-family="Courier, monospace" font-size="9" fill="#cc9999" text-anchor="middle">Immutable Snapshot</text>

  <line x1="555" y1="555" x2="595" y2="555" stroke="#d0c0b0" stroke-width="1.2" marker-end="url(#arrow)"/>

  <rect x="600" y="540" width="140" height="30" rx="3" ry="3" fill="#2a1a0a"/>
  <text x="670" y="559" font-family="Courier, monospace" font-size="9" fill="#cc9999" text-anchor="middle">Load in Runner/Client</text>

  <!-- Side annotations -->
  <circle cx="18" cy="115" r="3" fill="#4a3728"/>
  <text x="12" y="130" font-family="Arial, sans-serif" font-size="9" fill="#4a3728" text-anchor="start">1</text>

  <circle cx="18" cy="252" r="3" fill="#4a3728"/>
  <text x="12" y="267" font-family="Arial, sans-serif" font-size="9" fill="#4a3728" text-anchor="start">2</text>

  <circle cx="18" cy="397" r="3" fill="#4a3728"/>
  <text x="12" y="412" font-family="Arial, sans-serif" font-size="9" fill="#4a3728" text-anchor="start">3</text>

  <circle cx="18" cy="535" r="3" fill="#4a3728"/>
  <text x="12" y="550" font-family="Arial, sans-serif" font-size="9" fill="#4a3728" text-anchor="start">4</text>
</svg>
