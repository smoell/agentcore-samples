<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 480" width="800" height="480">
  <!-- Background -->
  <rect width="800" height="480" fill="white"/>

  <!-- Definitions -->
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="2" flood-color="#00000015"/>
    </filter>
    <linearGradient id="boxGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2d2d2d"/>
      <stop offset="100%" style="stop-color:#1a1a1a"/>
    </linearGradient>
    <linearGradient id="smeGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#5a4a3a"/>
      <stop offset="100%" style="stop-color:#4a3728"/>
    </linearGradient>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#1a1a1a"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="400" y="32" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#4a3728" text-anchor="middle">AgentCore Evaluation Architecture</text>

  <!-- ===== Row 1: Developer invokes Agent ===== -->

  <!-- Developer -->
  <g filter="url(#shadow)">
    <rect x="50" y="70" width="150" height="60" rx="6" ry="6" fill="url(#smeGradient)" stroke="#3a2718" stroke-width="1.5"/>
  </g>
  <text x="125" y="97" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white" text-anchor="middle">Developer / CI</text>
  <text x="125" y="117" font-family="Courier, monospace" font-size="9" fill="#cc9999" text-anchor="middle">evaluate.py</text>

  <!-- Arrow: Developer -> Agent -->
  <line x1="200" y1="100" x2="280" y2="100" stroke="#1a1a1a" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="240" y="92" font-family="Arial, sans-serif" font-size="9" fill="#666666" text-anchor="middle">invoke</text>

  <!-- AgentCore Runtime -->
  <g filter="url(#shadow)">
    <rect x="285" y="70" width="220" height="60" rx="6" ry="6" fill="url(#boxGradient)" stroke="#1a1a1a" stroke-width="1.5"/>
  </g>
  <text x="395" y="97" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white" text-anchor="middle">AgentCore Runtime</text>
  <text x="395" y="117" font-family="Arial, sans-serif" font-size="9" fill="#aaaaaa" text-anchor="middle">HR Assistant (Strands + Nova Lite)</text>

  <!-- Arrow: Agent -> CloudWatch -->
  <line x1="505" y1="100" x2="580" y2="100" stroke="#1a1a1a" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="542" y="92" font-family="Arial, sans-serif" font-size="9" fill="#666666" text-anchor="middle">ADOT</text>

  <!-- CloudWatch -->
  <g filter="url(#shadow)">
    <rect x="585" y="70" width="170" height="60" rx="6" ry="6" fill="url(#boxGradient)" stroke="#1a1a1a" stroke-width="1.5"/>
  </g>
  <text x="670" y="97" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white" text-anchor="middle">CloudWatch</text>
  <text x="670" y="117" font-family="Arial, sans-serif" font-size="9" fill="#aaaaaa" text-anchor="middle">Traces + Spans</text>

  <!-- ===== Row 2: Evaluation ===== -->

  <!-- Arrow: CloudWatch down to Evaluation -->
  <line x1="670" y1="130" x2="670" y2="185" stroke="#1a1a1a" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="685" y="162" font-family="Arial, sans-serif" font-size="9" fill="#666666" text-anchor="start">read spans</text>

  <!-- Evaluation Service -->
  <g filter="url(#shadow)">
    <rect x="150" y="190" width="620" height="80" rx="6" ry="6" fill="url(#boxGradient)" stroke="#1a1a1a" stroke-width="1.5"/>
  </g>
  <text x="460" y="215" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="white" text-anchor="middle">AgentCore Evaluation Service</text>

  <!-- Three interfaces -->
  <rect x="170" y="230" width="150" height="28" rx="3" ry="3" fill="#0d0d0d"/>
  <text x="245" y="248" font-family="Courier, monospace" font-size="9" fill="#7cb87c" text-anchor="middle">EvaluationClient</text>

  <rect x="340" y="230" width="190" height="28" rx="3" ry="3" fill="#0d0d0d"/>
  <text x="435" y="248" font-family="Courier, monospace" font-size="9" fill="#7cb87c" text-anchor="middle">OnDemandDatasetRunner</text>

  <rect x="550" y="230" width="190" height="28" rx="3" ry="3" fill="#0d0d0d"/>
  <text x="645" y="248" font-family="Courier, monospace" font-size="9" fill="#7cb87c" text-anchor="middle">BatchEvaluationRunner</text>

  <!-- Arrow: Developer down to Evaluation -->
  <line x1="125" y1="130" x2="125" y2="220" stroke="#4a3728" stroke-width="1.2"/>
  <line x1="125" y1="220" x2="145" y2="220" stroke="#4a3728" stroke-width="1.2" marker-end="url(#arrow)"/>
  <text x="80" y="180" font-family="Arial, sans-serif" font-size="9" fill="#4a3728" text-anchor="start">evaluate</text>

  <!-- ===== Row 3: Ground Truth + Evaluators ===== -->

  <!-- Ground Truth -->
  <g filter="url(#shadow)">
    <rect x="50" y="320" width="200" height="70" rx="6" ry="6" fill="url(#smeGradient)" stroke="#3a2718" stroke-width="1.5"/>
  </g>
  <text x="150" y="345" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white" text-anchor="middle">Ground Truth</text>
  <rect x="65" y="355" width="170" height="22" rx="3" ry="3" fill="#2a1a0a"/>
  <text x="150" y="370" font-family="Courier, monospace" font-size="8" fill="#cc9999" text-anchor="middle">expected_response | trajectory | assertions</text>

  <!-- Arrow: Ground Truth -> Evaluators -->
  <line x1="250" y1="355" x2="320" y2="355" stroke="#1a1a1a" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Evaluators -->
  <g filter="url(#shadow)">
    <rect x="325" y="310" width="430" height="90" rx="6" ry="6" fill="url(#boxGradient)" stroke="#1a1a1a" stroke-width="1.5"/>
  </g>
  <text x="540" y="335" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white" text-anchor="middle">Evaluators</text>

  <rect x="345" y="350" width="120" height="22" rx="3" ry="3" fill="#0d0d0d"/>
  <text x="405" y="365" font-family="Courier, monospace" font-size="8" fill="#cc9999" text-anchor="middle">Builtin (13)</text>

  <rect x="480" y="350" width="120" height="22" rx="3" ry="3" fill="#0d0d0d"/>
  <text x="540" y="365" font-family="Courier, monospace" font-size="8" fill="#cc9999" text-anchor="middle">Custom LLM</text>

  <rect x="615" y="350" width="120" height="22" rx="3" ry="3" fill="#0d0d0d"/>
  <text x="675" y="365" font-family="Courier, monospace" font-size="8" fill="#cc9999" text-anchor="middle">Custom Lambda</text>

  <!-- Arrow: Eval Service -> Evaluators -->
  <line x1="460" y1="270" x2="460" y2="305" stroke="#1a1a1a" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ===== Row 4: Output ===== -->

  <!-- Arrow: Evaluators -> Scores -->
  <line x1="540" y1="400" x2="540" y2="435" stroke="#1a1a1a" stroke-width="1.5" marker-end="url(#arrow)"/>

  <g filter="url(#shadow)">
    <rect x="380" y="440" width="320" height="30" rx="15" ry="15" fill="#4a3728" stroke="#3a2718" stroke-width="1.5"/>
  </g>
  <text x="540" y="460" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="white" text-anchor="middle">Scores + Explanations (0.0 — 1.0)</text>
</svg>
