# Restrict Upgrade header to WebSocket only — prevents H2C smuggling
map $http_upgrade $allowed_upgrade {
    "websocket" "websocket";
    default     "";
}

map $http_upgrade $allowed_connection {
    "websocket" "upgrade";
    default     "";
}

server {
    listen 3000;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Serve static files
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API requests to backend
    location /api/ {
        proxy_pass http://localhost:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $allowed_upgrade;
        proxy_set_header Connection $allowed_connection;
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
