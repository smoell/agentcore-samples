AWSTemplateFormatVersion: "2010-09-09"
Description: AgentCore Memory cross-region replication — DynamoDB Global Table

Parameters:
  PrimaryRegion:
    Type: String
    Default: us-east-1
  SecondaryRegion:
    Type: String
    Default: us-west-2

Resources:
  ReplicationConfigTable:
    Type: AWS::DynamoDB::GlobalTable
    Properties:
      TableName: AgentCoreMemoryReplicationConfig
      BillingMode: PAY_PER_REQUEST
      StreamSpecification:
        StreamViewType: NEW_AND_OLD_IMAGES
      AttributeDefinitions:
        - AttributeName: PK
          AttributeType: S
      KeySchema:
        - AttributeName: PK
          KeyType: HASH
      Replicas:
        - Region: !Ref PrimaryRegion
        - Region: !Ref SecondaryRegion

Outputs:
  TableName:
    Value: !Ref ReplicationConfigTable
  TableArn:
    Value: !GetAtt ReplicationConfigTable.Arn
